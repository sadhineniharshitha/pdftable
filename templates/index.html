<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical PDF Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
    h1 { color: #2c3e50; margin-bottom: 20px; }

    #upload-box {
      background: white; border: 2px dashed #3498db; border-radius: 12px;
      padding: 40px; text-align: center; margin-bottom: 24px; cursor: pointer;
    }
    #upload-box:hover { background: #ebf5fb; }
    #upload-box p { color: #666; margin-top: 10px; }
    input[type=file] { display: none; }

    .btn {
      background: #3498db; color: white; border: none;
      padding: 12px 28px; border-radius: 8px; cursor: pointer;
      font-size: 15px; margin: 6px;
    }
    .btn:hover { background: #2980b9; }
    .btn-green { background: #27ae60; }
    .btn-green:hover { background: #219a52; }

    #loading {
      display: none; text-align: center; padding: 30px;
      font-size: 18px; color: #666;
    }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid #ddd; border-top-color: #3498db;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 10px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .page-card {
      background: white; border-radius: 12px; padding: 20px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid #f0f4f8; padding-bottom: 12px; margin-bottom: 16px;
    }
    .page-header h3 { color: #2c3e50; font-size: 16px; }
    .badge {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
    }
    .badge-native  { background: #d5f5e3; color: #1e8449; }
    .badge-scanned { background: #fef9e7; color: #b7950b; }

    .page-body { display: flex; gap: 20px; }
    .page-text {
      flex: 1; background: #f8f9fa; border-radius: 8px;
      padding: 16px; font-size: 13px; line-height: 1.7;
      white-space: pre-wrap; max-height: 400px; overflow-y: auto;
      color: #333;
    }
    .page-image { flex: 1; }
    .page-image img {
      width: 100%; border-radius: 8px;
      border: 1px solid #ddd; cursor: zoom-in;
    }

    .stats {
      display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap;
    }
    .stat {
      background: #eaf4fd; border-radius: 6px;
      padding: 6px 14px; font-size: 12px; color: #2471a3;
    }

    #summary {
      background: white; border-radius: 12px; padding: 20px;
      margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: none;
    }
    #summary h2 { color: #2c3e50; margin-bottom: 12px; }
    .meta-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .meta-item { background: #f8f9fa; border-radius: 8px; padding: 10px 14px; }
    .meta-item label { font-size: 11px; color: #888; display: block; }
    .meta-item span { font-size: 14px; font-weight: bold; color: #2c3e50; }

    /* Modal for zoomed image */
    #modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 999;
      justify-content: center; align-items: center;
    }
    #modal.open { display: flex; }
    #modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    #modal-close {
      position: fixed; top: 20px; right: 30px;
      color: white; font-size: 36px; cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🏥 Medical PDF Viewer</h1>

<!-- Upload -->
<div id="upload-box" onclick="document.getElementById('fileInput').click()">
  <div style="font-size:48px">📄</div>
  <p><strong>Click to upload</strong> your medical PDF</p>
  <p>Extracts typed text instantly • Shows images of scanned pages</p>
  <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg" onchange="onFileSelected(this)">
</div>

<div style="text-align:center; margin-bottom:24px">
  <button class="btn btn-green" onclick="extractAll()">🔍 Extract Everything</button>
  <button class="btn" onclick="extractText()">📝 Text Only</button>
  <button class="btn" onclick="extractTables()">📊 Tables Only</button>
</div>

<div id="loading">
  <span class="spinner"></span> Processing your PDF... please wait
</div>

<!-- Summary -->
<div id="summary">
  <h2>📋 Document Summary</h2>
  <div class="meta-grid" id="meta-grid"></div>
</div>

<!-- Pages -->
<div id="results"></div>

<!-- Zoom Modal -->
<div id="modal" onclick="closeModal()">
  <span id="modal-close">✕</span>
  <img id="modal-img" src="">
</div>

<script>
  let selectedFile = null;

  function onFileSelected(input) {
    if (input.files[0]) {
      selectedFile = input.files[0];
      document.getElementById('upload-box').style.borderColor = '#27ae60';
      document.querySelector('#upload-box p').textContent = '✅ ' + selectedFile.name + ' selected';
    }
  }

  function showLoading() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').innerHTML = '';
    document.getElementById('summary').style.display = 'none';
  }

  function hideLoading() {
    document.getElementById('loading').style.display = 'none';
  }

  async function uploadAndFetch(endpoint) {
    if (!selectedFile) { alert('Please select a PDF file first!'); return null; }
    showLoading();
    const form = new FormData();
    form.append('file', selectedFile);
    try {
      const resp = await fetch(endpoint, { method: 'POST', body: form });
      const data = await resp.json();
      hideLoading();
      if (data.error) { alert('Error: ' + data.error); return null; }
      return data;
    } catch (e) {
      hideLoading();
      alert('Failed to connect to server: ' + e.message);
      return null;
    }
  }

  async function extractAll() {
    const data = await uploadAndFetch('/api/extract-all');
    if (!data) return;

    // Show metadata summary
    if (data.metadata) {
      const grid = document.getElementById('meta-grid');
      grid.innerHTML = '';
      const items = [
        ['Total Pages', data.total_pages],
        ['File Size', (data.metadata.file_size_mb || '?') + ' MB'],
        ['Title', data.metadata.title],
        ['Author', data.metadata.author],
        ['Creator', data.metadata.creator],
        ['Extracted At', new Date().toLocaleTimeString()]
      ];
      items.forEach(([label, val]) => {
        grid.innerHTML += `<div class="meta-item"><label>${label}</label><span>${val || 'N/A'}</span></div>`;
      });
      document.getElementById('summary').style.display = 'block';
    }

    // Show pages
    const container = document.getElementById('results');
    container.innerHTML = '';
    (data.pages || []).forEach(page => {
      const isScanned = page.method !== 'native';
      container.innerHTML += `
        <div class="page-card">
          <div class="page-header">
            <h3>Page ${page.page_number}</h3>
            <span class="badge ${isScanned ? 'badge-scanned' : 'badge-native'}">
              ${isScanned ? '🖼️ Scanned' : '📝 Text'}
            </span>
          </div>
          <div class="page-body">
            <div class="page-text">${escHtml(page.text)}</div>
            <div class="page-image">
              <img src="${page.image}" onclick="zoomImage('${page.image}')" title="Click to zoom">
            </div>
          </div>
          <div class="stats">
            <div class="stat">📊 ${page.statistics.text_length} characters</div>
            <div class="stat">📄 ${page.statistics.lines} lines</div>
            <div class="stat">🗂️ ${page.statistics.tables_count} table(s)</div>
          </div>
        </div>`;
    });
  }

  async function extractText() {
    const data = await uploadAndFetch('/api/extract');
    if (!data) return;
    document.getElementById('results').innerHTML = `
      <div class="page-card">
        <div class="page-header"><h3>📝 Extracted Text</h3></div>
        <div class="page-text" style="max-height:none">${escHtml(data.text || '')}</div>
      </div>`;
  }

  async function extractTables() {
    const data = await uploadAndFetch('/api/extract-tables');
    if (!data) return;
    const container = document.getElementById('results');
    container.innerHTML = '';
    (data.tables || []).forEach(t => {
      let tableHtml = '<table style="width:100%;border-collapse:collapse;font-size:13px">';
      t.rows.forEach((row, ri) => {
        tableHtml += '<tr>';
        row.forEach(cell => {
          const tag = ri === 0 ? 'th' : 'td';
          tableHtml += `<${tag} style="border:1px solid #ddd;padding:6px 10px;${ri===0?'background:#eaf4fd;font-weight:bold':''}">${escHtml(cell)}</${tag}>`;
        });
        tableHtml += '</tr>';
      });
      tableHtml += '</table>';
      container.innerHTML += `
        <div class="page-card">
          <div class="page-header"><h3>📊 Page ${t.page} — Table</h3></div>
          ${tableHtml}
        </div>`;
    });
    if (!data.tables || data.tables.length === 0) {
      container.innerHTML = '<div class="page-card"><p style="color:#888">No tables found in this PDF.</p></div>';
    }
  }

  function zoomImage(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function escHtml(text) {
    return (text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
